version: '3.9'

services:
  yulia-shell:
    build:
      context: .
      dockerfile: Containerfile
    image: yulia-shell:dev
    container_name: yulia-shell
    ports:
      - "4321:4321"
      - "50051:50051"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
      - JULIAAPP_DATA_DIR=/app/data
      - JULIA_AGENT_GRPC_PORT=50051
      - JULIAAPP_SHELL_STATUS_POLL_INTERVAL_MS=${JULIAAPP_SHELL_STATUS_POLL_INTERVAL_MS:-1500}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-change-me}
      - AGENT_JWT_SECRET=${AGENT_JWT_SECRET:-change-me}
    volumes:
      - /mnt/ostree/podman/julia-shell/data:/app/data
      - /mnt/ostree/podman/julia-shell/tmp:/app/tools/tmp
