version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Tbilisi"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "server"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "npm"
    directory: "/apps/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Asia/Tbilisi"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "server"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "cargo"
    directory: "/apps/agent"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Asia/Tbilisi"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "agent"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:45"
      timezone: "Asia/Tbilisi"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
