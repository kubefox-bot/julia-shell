name: Agent Publish

on:
  pull_request:
    paths:
      - 'apps/agent/**'
      - 'packages/protocol/**'
      - '.github/workflows/agent-publish.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/agent/**'
      - 'packages/protocol/**'
      - '.github/workflows/agent-publish.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve agent version
        id: version
        run: |
          VERSION=$(awk -F ' = ' '/^version = / { gsub(/"/, "", $2); print $2; exit }' apps/agent/Cargo.toml)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/agent

      - name: Build agent
        working-directory: apps/agent
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Prepare Linux dist
        run: |
          mkdir -p apps/agent/dist-linux
          cp "apps/agent/target/x86_64-unknown-linux-gnu/release/julia-agent" "apps/agent/dist-linux/julia-agent"
          cp "apps/agent/start-agent.sh" "apps/agent/dist-linux/start-agent.sh"
          cp "apps/agent/.env.example" "apps/agent/dist-linux/.env.example"
          chmod +x "apps/agent/dist-linux/julia-agent" "apps/agent/dist-linux/start-agent.sh"
          tar -czf julia-agent-linux-x64.tar.gz -C apps/agent/dist-linux .
          (cd apps/agent/dist-linux && zip -r "../../../julia-agent-linux-x64.zip" .)

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          "$(go env GOPATH)/bin/nfpm" --version

      - name: Build Linux deb/rpm
        env:
          AGENT_VERSION: ${{ steps.version.outputs.value }}
        run: |
          nfpm pkg --config apps/agent/packaging/linux/nfpm.yaml --packager deb --target julia-agent-linux-x64.deb
          nfpm pkg --config apps/agent/packaging/linux/nfpm.yaml --packager rpm --target julia-agent-linux-x64.rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            julia-agent-linux-x64.tar.gz
            julia-agent-linux-x64.zip
            julia-agent-linux-x64.deb
            julia-agent-linux-x64.rpm
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve agent version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content apps/agent/Cargo.toml | Select-String '^version = "(.+)"$').Matches[0].Groups[1].Value
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/agent

      - name: Build agent
        working-directory: apps/agent
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Prepare Windows dist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force apps/agent/dist | Out-Null
          Copy-Item "apps/agent/target/x86_64-pc-windows-msvc/release/julia-agent.exe" "apps/agent/dist/julia-agent.exe"
          Copy-Item "apps/agent/start-agent.ps1" "apps/agent/dist/start-agent.ps1"
          Copy-Item "apps/agent/.env.example" "apps/agent/dist/.env.example"
          Compress-Archive -Path "apps/agent/dist/*" -DestinationPath "julia-agent-windows-x64.zip" -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        working-directory: apps/agent
        shell: pwsh
        run: |
          iscc "/DMyAppVersion=${{ steps.version.outputs.value }}" "packaging/windows/julia-agent.iss"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            julia-agent-windows-x64.zip
            apps/agent/julia-agent-windows-x64-installer.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve agent version
        id: version
        run: |
          VERSION=$(awk -F ' = ' '/^version = / { gsub(/"/, "", $2); print $2; exit }' apps/agent/Cargo.toml)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/agent

      - name: Build agent
        working-directory: apps/agent
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Prepare macOS dist
        run: |
          mkdir -p apps/agent/dist-macos
          cp "apps/agent/target/aarch64-apple-darwin/release/julia-agent" "apps/agent/dist-macos/julia-agent"
          cp "apps/agent/start-agent.sh" "apps/agent/dist-macos/start-agent.sh"
          cp "apps/agent/.env.example" "apps/agent/dist-macos/.env.example"
          chmod +x "apps/agent/dist-macos/julia-agent" "apps/agent/dist-macos/start-agent.sh"
          tar -czf julia-agent-macos-arm64.tar.gz -C apps/agent/dist-macos .
          (cd apps/agent/dist-macos && zip -r "../../../julia-agent-macos-arm64.zip" .)

      - name: Build macOS installer pkg
        run: |
          rm -rf apps/agent/pkgroot
          mkdir -p apps/agent/pkgroot/usr/local/bin
          mkdir -p apps/agent/pkgroot/usr/local/share/julia-agent
          cp "apps/agent/dist-macos/julia-agent" "apps/agent/pkgroot/usr/local/bin/julia-agent"
          cp "apps/agent/dist-macos/start-agent.sh" "apps/agent/pkgroot/usr/local/share/julia-agent/start-agent.sh"
          cp "apps/agent/dist-macos/.env.example" "apps/agent/pkgroot/usr/local/share/julia-agent/.env.example"
          chmod +x "apps/agent/pkgroot/usr/local/bin/julia-agent" "apps/agent/pkgroot/usr/local/share/julia-agent/start-agent.sh"
          pkgbuild \
            --root apps/agent/pkgroot \
            --identifier com.yulia.julia-agent \
            --version "${{ steps.version.outputs.value }}" \
            --install-location / \
            julia-agent-macos-arm64.pkg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: |
            julia-agent-macos-arm64.tar.gz
            julia-agent-macos-arm64.zip
            julia-agent-macos-arm64.pkg
          if-no-files-found: error

  publish:
    needs:
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-latest
          name: Agent Latest
          make_latest: true
          prerelease: false
          files: |
            dist/julia-agent-linux-x64.tar.gz
            dist/julia-agent-linux-x64.zip
            dist/julia-agent-linux-x64.deb
            dist/julia-agent-linux-x64.rpm
            dist/julia-agent-windows-x64.zip
            dist/julia-agent-windows-x64-installer.exe
            dist/julia-agent-macos-arm64.tar.gz
            dist/julia-agent-macos-arm64.zip
            dist/julia-agent-macos-arm64.pkg
            dist/SHA256SUMS
          overwrite_files: true
