name: PR Checks

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn 4.9.1
        run: |
          corepack prepare yarn@4.9.1 --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn workspace @julia/server lint

      - name: Typecheck
        run: yarn workspace @julia/server typecheck

      - name: Tests
        run: yarn workspace @julia/server test
