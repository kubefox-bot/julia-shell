name: Server PR Checks

on:
  pull_request:
    paths:
      - 'apps/server/**'
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
      - '.github/workflows/server-publish.yml'
      - '.github/workflows/server-pr-checks.yml'
  workflow_dispatch:

concurrency:
  group: server-pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  server-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn 4.9.1
        run: |
          corepack prepare yarn@4.9.1 --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn workspace @julia/server lint

      - name: Typecheck
        run: yarn workspace @julia/server typecheck

      - name: Tests
        run: yarn workspace @julia/server test
