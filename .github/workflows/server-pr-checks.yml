name: Server PR Checks

on:
  pull_request:
    paths:
      - 'apps/server/**'
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
      - '.github/workflows/server-release.yml'
      - '.github/workflows/server-pr-checks.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/server/**'
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
      - '.github/workflows/server-release.yml'
      - '.github/workflows/server-pr-checks.yml'
  workflow_dispatch:

concurrency:
  group: server-pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  server-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Yarn/NPM dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.yarn/berry/cache
            .yarn/cache
            .yarn/install-state.gz
            node_modules
          key: node-yarn-${{ runner.os }}-node24-${{ hashFiles('yarn.lock', 'package.json', 'apps/server/package.json', '.yarnrc.yml') }}
          restore-keys: |
            node-yarn-${{ runner.os }}-node24-

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn 4.9.1
        run: |
          corepack prepare yarn@4.9.1 --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn workspace @julia/server lint

      - name: Tests
        run: yarn workspace @julia/server test
