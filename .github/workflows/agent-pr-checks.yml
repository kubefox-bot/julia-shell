name: Agent PR Checks

on:
  pull_request:
    paths:
      - 'apps/agent/**'
      - 'packages/protocol/**'
      - '.github/workflows/agent-publish.yml'
      - '.github/workflows/agent-pr-checks.yml'
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/agent/**'
      - 'packages/protocol/**'
      - '.github/workflows/agent-publish.yml'
      - '.github/workflows/agent-pr-checks.yml'
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
  workflow_dispatch:

concurrency:
  group: agent-pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  agent-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache day key
        id: cache-day
        run: echo "day=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust dependencies cache (1 day)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/agent/target
          key: rust-agent-${{ runner.os }}-${{ steps.cache-day.outputs.day }}-${{ hashFiles('apps/agent/Cargo.lock') }}
          restore-keys: |
            rust-agent-${{ runner.os }}-

      - name: fmt
        working-directory: apps/agent
        run: cargo fmt --all -- --check

      - name: clippy
        working-directory: apps/agent
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: check
        working-directory: apps/agent
        run: cargo check --locked

      - name: test
        working-directory: apps/agent
        run: cargo test --locked
