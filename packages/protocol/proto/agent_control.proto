syntax = "proto3";

package julia.agent.v1;

import "widgets/transcribe.proto";
import "widgets/terminal_agent.proto";

service AgentControlService {
  rpc StreamConnect(stream AgentEnvelope) returns (stream ServerEnvelope);
}

message AgentEnvelope {
  string protocol_version = 1;
  string agent_id = 2;
  string session_id = 3;
  string job_id = 4;
  int64 timestamp_unix_ms = 5;
  string access_jwt = 6;

  oneof payload {
    Heartbeat heartbeat = 10;
    WidgetEvent widget_event = 11;
  }
}

message ServerEnvelope {
  string protocol_version = 1;
  string session_id = 2;
  string job_id = 3;
  int64 timestamp_unix_ms = 4;

  oneof payload {
    HealthPing health_ping = 10;
    WidgetCommand widget_command = 11;
    ErrorEnvelope error = 12;
  }
}

message Heartbeat {
  string agent_version = 1;
  string status = 2;
  string hostname = 3;
}

message HealthPing {
  string nonce = 1;
}

message WidgetCommand {
  string widget_id = 1;

  oneof payload {
    TranscribeStartCommand transcribe_start = 10;
    TranscribeCancelCommand transcribe_cancel = 11;
    TerminalAgentSendMessageCommand terminal_agent_send_message = 20;
    TerminalAgentResetDialogCommand terminal_agent_reset_dialog = 21;
  }
}

message WidgetEvent {
  string widget_id = 1;

  oneof payload {
    TranscribeProgressEvent transcribe_progress = 10;
    TranscribeTokenEvent transcribe_token = 11;
    TranscribeDoneEvent transcribe_done = 12;
    TranscribeErrorEvent transcribe_error = 13;

    TerminalAgentStatusEvent terminal_agent_status = 20;
    TerminalAgentAssistantChunkEvent terminal_agent_assistant_chunk = 21;
    TerminalAgentAssistantDoneEvent terminal_agent_assistant_done = 22;
    TerminalAgentResumeFailedEvent terminal_agent_resume_failed = 23;
    TerminalAgentErrorEvent terminal_agent_error = 24;
  }
}

message ErrorEnvelope {
  string code = 1;
  string message = 2;
  bool retryable = 3;
}
